<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Mini Retro Arcade</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root { --admin-bg: #111; }
    body { background: var(--admin-bg); }
    .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
    .login-box { max-width: 400px; margin: 100px auto; text-align: center; background: var(--bg-3); padding: 40px; border-radius: 20px; border: 1px solid var(--orange); }
    .admin-card { background: var(--bg-3); border-radius: 15px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); }
    .admin-card:hover { border-color: var(--orange); }
    .input-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px; }
    .addon-edit-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; margin-bottom: 8px; align-items: center; }
    .btn-del { background: var(--red); padding: 8px 12px; font-size: 0.8rem; }
    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .save-fixed { position: fixed; bottom: 30px; right: 30px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    textarea { width: 100%; height: 80px; margin-top: 10px; }
    .add-btn { background: var(--bg-2); border: 1px dashed var(--orange); color: var(--orange); width: 100%; padding: 15px; margin-top: 10px; }
  </style>
</head>
<body>

  <div id="login-screen" class="login-box">
    <h1 style="font-family:var(--font-pixel); font-size:0.8rem; margin-bottom:20px;">ADMIN LOGIN</h1>
    <div class="form-group">
      <input type="password" id="admin-pass" placeholder="Contraseña de gestión" style="text-align:center;">
    </div>
    <button class="btn btn-primary" onclick="checkPass()" style="width:100%; margin-top:20px;">Entrar al sistema</button>
  </div>

  <div id="admin-content" class="admin-container" style="display:none;">
    <div class="header-actions">
      <div>
        <h1 class="section-title" style="margin-bottom:0;">Panel de <span>Gestión</span></h1>
        <p style="color:var(--text-muted);">Editá precios, productos y adicionales del catálogo</p>
      </div>
      <div style="display:flex; gap:12px;">
        <button class="btn btn-outline" onclick="toggleGithubConfig()" id="btn-config">⚙️ Configurar GitHub</button>
        <a href="index.html" class="btn btn-outline">Volver a la web</a>
      </div>
    </div>

    <!-- CONFIGURACIÓN GITHUB (OCULTA) -->
    <div id="github-config" class="admin-card" style="display:none; border-color:var(--yellow); background:rgba(251,191,36,0.05);">
      <h3 style="font-family:var(--font-pixel); font-size:0.6rem; color:var(--yellow); margin-bottom:15px;">CONFIGURACIÓN DE AUTOMATIZACIÓN</h3>
      <div class="input-row">
        <div class="form-group">
          <label>Usuario / Organización GitHub</label>
          <input type="text" id="gh-owner" placeholder="ej: miniretro" onchange="saveConfig()">
        </div>
        <div class="form-group">
          <label>Nombre del Repositorio</label>
          <input type="text" id="gh-repo" placeholder="ej: arcade-web" onchange="saveConfig()">
        </div>
      </div>
      <div class="form-group">
        <label>Personal Access Token (PAT) <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--yellow); font-size:0.7rem; text-decoration:underline; margin-left:10px;">Generar nuevo token</a></label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" onchange="saveConfig()">
        <p style="font-size:0.65rem; color:var(--text-muted); margin-top:8px;">⚠️ El token debe tener permisos de 'repo'. Se guarda localmente en tu navegador.</p>
      </div>
    </div>

    <div id="products-editor">
      <!-- Se llena via JS -->
    </div>

    <button class="add-btn" onclick="addNewProduct()">+ AGREGAR NUEVO PRODUCTO AL CATÁLOGO</button>

    <div style="height: 120px;"></div>

    <div class="save-fixed">
      <div id="sync-status" style="text-align:center; margin-bottom:10px; font-size:0.8rem; font-weight:700;"></div>
      <div style="display:flex; gap:12px; align-items:end;">
        <button class="btn btn-outline" onclick="exportData()" title="Descargar como copia de seguridad">💾</button>
        <button class="btn btn-primary" id="btn-sync" onclick="syncToGitHub()" style="padding: 20px 40px; font-size: 1.1rem; flex:1;">
          🚀 PUBLICAR CAMBIOS EN LA WEB
        </button>
      </div>
    </div>
  </div>

  <script src="data/products.js"></script>
  <script>
    const PASS = "arcade2024";

    function checkPass() {
      const p = document.getElementById('admin-pass').value;
      if(p === PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadConfig();
        initEditor();
      } else { alert("Contraseña incorrecta"); }
    }

    let localProducts = [...PRODUCTS];
    let imagesToUpload = {}; // key: productIdx, value: { name, base64, fileType }

    function checkPass() {
      const p = document.getElementById('admin-pass').value;
      if(p === PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadConfig();
        initEditor();
      } else { alert("Contraseña incorrecta"); }
    }

    function toggleGithubConfig() {
      const el = document.getElementById('github-config');
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function saveConfig() {
      localStorage.setItem('gh_owner', document.getElementById('gh-owner').value);
      localStorage.setItem('gh_repo', document.getElementById('gh-repo').value);
      localStorage.setItem('gh_token', document.getElementById('gh-token').value);
    }

    function loadConfig() {
      document.getElementById('gh-owner').value = localStorage.getItem('gh_owner') || '';
      document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
      document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
    }

    // ─── LÓGICA DE IMÁGENES ─────────────────────────────────────
    function handleImageSelect(idx, file) {
      if(!file) return;
      if(file.size > 2 * 1024 * 1024) { 
        alert("⚠️ La imagen es demasiado pesada. Por favor, usa una menor a 2MB."); 
        return; 
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        const base64 = e.target.result.split(',')[1];
        const preview = document.getElementById(`preview-${idx}`);
        preview.src = e.target.result;
        
        // Guardar para subir luego
        const extension = file.name.split('.').pop();
        const newFilename = `prod_${Date.now()}.${extension}`;
        imagesToUpload[idx] = { 
          name: newFilename, 
          base64: base64, 
          fileType: file.type 
        };
      };
      reader.readAsDataURL(file);
    }

    async function uploadToGitHub(owner, repo, token, path, content, message) {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const res = await fetch(apiUrl, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, content })
      });
      if(!res.ok) throw new Error(`No se pudo subir el archivo: ${path}`);
      return await res.json();
    }

    async function syncToGitHub() {
      const owner = document.getElementById('gh-owner').value;
      const repo  = document.getElementById('gh-repo').value;
      const token = document.getElementById('gh-token').value;
      const status = document.getElementById('sync-status');
      const btn = document.getElementById('btn-sync');

      if(!owner || !repo || !token) {
        alert("⚠️ Por favor, configura primero los datos de GitHub (clic en el engranaje).");
        toggleGithubConfig();
        return;
      }

      if(!confirm("¿Estás seguro de publicar estos cambios? La web se actualizará automáticamente.")) return;

      try {
        status.textContent = "⏳ Iniciando sincronización...";
        status.style.color = "var(--yellow)";
        btn.disabled = true;

        // 1. SUBIR IMÁGENES PRIMERO
        const imageIndices = Object.keys(imagesToUpload);
        if(imageIndices.length > 0) {
          status.textContent = `⏳ Subiendo ${imageIndices.length} imágenes...`;
          for(let idx of imageIndices) {
            const img = imagesToUpload[idx];
            const path = `assets/images/${img.name}`;
            await uploadToGitHub(owner, repo, token, path, img.base64, "Carga de imagen de producto desde Admin Panel");
            // Actualizar la ruta en el objeto local
            localProducts[idx].image = path;
          }
        }

        // 2. Obtener el SHA de data/products.js
        status.textContent = "⏳ Actualizando base de datos...";
        const dbPath = `data/products.js`;
        const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${dbPath}`;
        const getRes = await fetch(apiUrl, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });

        if(!getRes.ok) throw new Error("No se pudo encontrar products.js en GitHub.");
        const fileData = await getRes.json();
        const sha = fileData.sha;

        // 3. Preparar nuevo contenido de products.js
        const newDbContent = "const WHATSAPP_NUMBER = \"" + WHATSAPP_NUMBER + "\";\n\nconst PRODUCTS = " + JSON.stringify(localProducts, null, 2) + ";\n\nconst COMING_SOON = " + JSON.stringify(COMING_SOON, null, 2) + ";\n\nconst TECH_SERVICES = " + JSON.stringify(TECH_SERVICES, null, 2) + ";\n\nconst SOCIAL_LINKS = " + JSON.stringify(SOCIAL_LINKS, null, 2) + ";\n\nconst LOCATION = " + JSON.stringify(LOCATION, null, 2) + ";";
        
        // 4. Subir nuevo products.js
        await fetch(apiUrl, {
          method: 'PUT',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: "Actualización de catálogo e imágenes desde Admin Panel",
            content: btoa(unescape(encodeURIComponent(newDbContent))),
            sha: sha
          })
        });

        status.textContent = "✅ ¡TODO PUBLICADO CON ÉXITO!";
        status.style.color = "#25D366";
        imagesToUpload = {}; // Limpiar cola de imágenes
        setTimeout(() => { status.textContent = ""; btn.disabled = false; }, 5000);

      } catch (err) {
        alert("❌ ERROR: " + err.message);
        status.textContent = "❌ Falló la sincronización";
        status.style.color = "var(--red)";
        btn.disabled = false;
      }
    }

    function initEditor() {
      const container = document.getElementById('products-editor');
      container.innerHTML = localProducts.map((p, idx) => `
        <div class="admin-card">
          <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:20px;">
            <h3 style="font-family:var(--font-pixel); font-size:0.7rem; color:var(--yellow);">PRODUCTO #${idx+1}</h3>
            <button class="btn btn-del" onclick="deleteProduct(${idx})">Eliminar Producto</button>
          </div>
          
          <div style="display:grid; grid-template-columns:150px 1fr; gap:24px; margin-bottom:24px;">
            <div style="text-align:center;">
              <img id="preview-${idx}" src="${p.image}" style="width:150px; height:150px; object-fit:cover; border-radius:10px; border:2px solid var(--border); margin-bottom:12px;">
              <button class="btn btn-outline" style="font-size:0.7rem; width:100%;" onclick="document.getElementById('file-${idx}').click()">📸 Cambiar Foto</button>
              <input type="file" id="file-${idx}" style="display:none;" accept="image/*" onchange="handleImageSelect(${idx}, this.files[0])">
            </div>
            
            <div>
              <div class="input-row">
                <div class="form-group">
                  <label>Nombre del Producto</label>
                  <input type="text" value="${p.name}" onchange="updateVal(${idx}, 'name', this.value)">
                </div>
                <div class="form-group">
                  <label>Precio Base ($)</label>
                  <input type="number" value="${p.basePrice}" onchange="updateVal(${idx}, 'basePrice', parseInt(this.value))">
                </div>
              </div>

              <div class="form-group">
                <label>Descripción</label>
                <textarea onchange="updateVal(${idx}, 'description', this.value)">${p.description}</textarea>
              </div>
            </div>
          </div>

          <div style="margin-top:20px;">
            <label style="font-weight:700; color:var(--orange);">ADICIONALES / EXTRAS</label>
            <div id="addons-${idx}" style="margin-top:10px;">
              ${p.addons.map((a, aidx) => `
                <div class="addon-edit-row">
                  <input type="text" value="${a.name}" onchange="updateAddon(${idx}, ${aidx}, 'name', this.value)">
                  <input type="number" value="${a.price}" onchange="updateAddon(${idx}, ${aidx}, 'price', parseInt(this.value))">
                  <button class="btn btn-del" onclick="deleteAddon(${idx}, ${aidx})">✕</button>
                </div>
              `).join('')}
            </div>
            <button class="btn btn-outline" style="font-size:0.7rem; padding:8px 15px;" onclick="addAddon(${idx})">+ Agregar Extra</button>
          </div>
        </div>
      `).join('');
    }

    function updateVal(idx, key, val) { localProducts[idx][key] = val; }
    
    function updateAddon(pidx, aidx, key, val) { localProducts[pidx].addons[aidx][key] = val; }

    function deleteProduct(idx) {
      if(confirm("¿Eliminar este producto permanentemente?")) {
        localProducts.splice(idx, 1);
        initEditor();
      }
    }

    function deleteAddon(pidx, aidx) {
      localProducts[pidx].addons.splice(aidx, 1);
      initEditor();
    }

    function addAddon(pidx) {
      localProducts[pidx].addons.push({ id: 'new-' + Date.now(), name: 'Nuevo Extra', price: 0 });
      initEditor();
    }

    function addNewProduct() {
      localProducts.push({
        id: "new-" + Date.now(),
        name: "Nuevo Producto",
        description: "Descripción del producto...",
        image: "assets/images/arcade_classic.png",
        basePrice: 0,
        badge: "",
        category: "otros",
        addons: []
      });
      initEditor();
      window.scrollTo(0, document.body.scrollHeight);
    }

    function exportData() {
      const dataStr = "const WHATSAPP_NUMBER = \"" + WHATSAPP_NUMBER + "\";\n\nconst PRODUCTS = " + JSON.stringify(localProducts, null, 2) + ";\n\nconst COMING_SOON = " + JSON.stringify(COMING_SOON, null, 2) + ";\n\nconst TECH_SERVICES = " + JSON.stringify(TECH_SERVICES, null, 2) + ";\n\nconst SOCIAL_LINKS = " + JSON.stringify(SOCIAL_LINKS, null, 2) + ";\n\nconst LOCATION = " + JSON.stringify(LOCATION, null, 2) + ";";
      
      const blob = new Blob([dataStr], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'products.js';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      alert("✅ Archivo 'products.js' generado.\n\nPara aplicar los cambios:\n1. Ve a la carpeta del proyecto.\n2. Entra en /data/\n3. Reemplaza el archivo 'products.js' actual por el que acabas de descargar.");
    }
  </script>
</body>
</html>
